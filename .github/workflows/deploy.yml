name: Build and Deploy to IPFS

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fetch GitHub stats
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: bash scripts/fetch-stats.sh

      - name: Build static site
        run: bun run build

      - name: Upload to IPFS via Pinata
        id: pinata
        uses: anantaramdas/ipfs-pinata-deploy-action@v1.6.4
        with:
          pin-name: portfolio-${{ github.sha }}
          path: ./out
          pinata-api-key: ${{ secrets.PINATA_API_KEY }}
          pinata-secret-api-key: ${{ secrets.PINATA_SECRET_KEY }}

      - name: Update IPNS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null
          ssh -o StrictHostKeyChecking=accept-new $SERVER_USER@$SERVER_HOST \
            "ipfs name publish --resolve=false --key=portfolio /ipfs/${{ steps.pinata.outputs.hash }}"

      - name: Unpin old deployments
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
        run: |
          CURRENT_CID="${{ steps.pinata.outputs.hash }}"
          echo "Current deployment CID: $CURRENT_CID"

          # Wait for Pinata to process the new pin
          echo "Waiting 30s for Pinata to propagate..."
          sleep 30

          # List all pinned files with "portfolio-" prefix
          PINS=$(curl -s -g -X GET \
            "https://api.pinata.cloud/data/pinList?status=pinned&metadata%5Bname%5D=portfolio-&pageLimit=1000" \
            -H "pinata_api_key: $PINATA_API_KEY" \
            -H "pinata_secret_api_key: $PINATA_SECRET_KEY")

          # Extract CIDs of old pins (exclude current deployment)
          OLD_CIDS=$(echo "$PINS" | jq -r --arg current "$CURRENT_CID" \
            '.rows[] | select(.ipfs_pin_hash != $current) | .ipfs_pin_hash')

          if [ -z "$OLD_CIDS" ]; then
            echo "No old pins to clean up"
            exit 0
          fi

          # Unpin each old deployment
          for cid in $OLD_CIDS; do
            echo "Unpinning old deployment: $cid"
            curl -s -X DELETE \
              "https://api.pinata.cloud/pinning/unpin/$cid" \
              -H "pinata_api_key: $PINATA_API_KEY" \
              -H "pinata_secret_api_key: $PINATA_SECRET_KEY"
          done

          echo "Cleaned up $(echo "$OLD_CIDS" | wc -l) old pin(s)"

      - name: Summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**IPFS Hash**: \`${{ steps.pinata.outputs.hash }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Preview**: https://gateway.pinata.cloud/ipfs/${{ steps.pinata.outputs.hash }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**IPNS**: Updated automatically via server" >> $GITHUB_STEP_SUMMARY
